<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootcamp Resources | Documentation</title>
    <meta name="description" content="Documentation and learning materials for the Data Engineering Bootcamp.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
    <!-- Mermaid.js for diagrams -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <!-- Prism.js for code highlighting -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
    
    <style>
        :root {
            --bg-sidebar: #f1f5f9;
            --bg-content: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent: #2563eb;
            --border: #e2e8f0;
            --sidebar-width: 280px;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-content);
            color: var(--text-primary);
            line-height: 1.6;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            color: var(--text-primary);
        }

        .sidebar-header p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .nav-group {
            padding: 1rem 0;
        }

        .nav-title {
            padding: 0.75rem 1.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: var(--transition);
        }

        .nav-title:hover {
            color: var(--accent);
            background: rgba(37, 99, 235, 0.03);
        }

        .nav-list {
            list-style: none;
        }

        .nav-item {
            padding: 0.5rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: var(--transition);
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            color: var(--text-primary);
            background: rgba(0, 0, 0, 0.03);
        }

        .nav-item.active {
            color: var(--accent);
            background: rgba(37, 99, 235, 0.05);
            border-left-color: var(--accent);
        }

        .nav-title.active {
            color: var(--accent);
            background: rgba(37, 99, 235, 0.05);
        }

        .nav-item svg {
            width: 16px;
            height: 16px;
            opacity: 0.7;
        }

        /* Main Content Styles */
        .main-container {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        .top-bar {
            height: 60px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0 2rem;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .breadcrumb {
            font-size: 0.85rem;
            color: var(--text-secondary);
            flex-grow: 1;
        }

        .content-body {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem 6rem;
            width: 100%;
        }

        /* Markdown & Code Styling */
        #markdown-content {
            color: #334155;
            position: relative;
        }

        #markdown-content h1 { font-size: 2.25rem; font-weight: 800; margin-bottom: 1.5rem; color: var(--text-primary); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        #markdown-content h2 { font-size: 1.5rem; font-weight: 700; margin: 2rem 0 1rem; color: var(--text-primary); }
        #markdown-content h3 { font-size: 1.25rem; font-weight: 600; margin: 1.5rem 0 0.75rem; }
        #markdown-content p { margin-bottom: 1.25rem; }
        #markdown-content ul, #markdown-content ol { margin-bottom: 1.25rem; padding-left: 1.5rem; }
        #markdown-content li { margin-bottom: 0.5rem; }
        
        /* Prism Overrides */
        pre[class*="language-"] {
            margin: 1.5rem 0;
            border-radius: 0.75rem;
            font-size: 0.9rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        .code-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: -1.5rem;
            position: relative;
            z-index: 5;
            padding-right: 1rem;
            top: 1rem;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #94a3b8;
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(4px);
        }

        .copy-btn:hover {
            background: white;
            color: var(--text-primary);
        }

        .copy-btn.copied {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }

        /* Mermaid Specific */
        .mermaid { background: white !important; padding: 1rem; border-radius: 0.5rem; text-align: center; margin-bottom: 1.5rem; border: 1px solid var(--border); }

        #markdown-content blockquote { border-left: 4px solid var(--accent); padding-left: 1rem; background: #eff6ff; padding: 1rem; border-radius: 0 0.5rem 0.5rem 0; color: #1e40af; margin-bottom: 1.25rem; }
        #markdown-content img { max-width: 100%; height: auto; border-radius: 0.5rem; margin: 1rem 0; }

        /* Download Section */
        .download-footer {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .download-btn-small {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--text-primary);
            color: white;
            padding: 0.75rem 1.25rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: var(--transition);
        }

        .download-btn-small:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; max-height: 300px; border-r: 0; border-b: 1px solid var(--border); }
            .sidebar-header { padding: 1rem 1.5rem; }
            .top-bar { display: none; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>Bootcamp 01 April 2026</h1>
            <p>Forbspace cafe`</p>
        </div>

        <nav id="sidebar-nav">
            <!-- Session 1 -->
            <div class="nav-group">
                <div class="nav-title" onclick="loadFile(sessions.s1_intro, 'Session 1')">Session 1: Basics</div>
                <ul class="nav-list" id="session1-list"></ul>
            </div>

            <!-- Session 2 -->
            <div class="nav-group">
                <div class="nav-title">Session 2: Data Takeoff</div>
                <ul class="nav-list" id="session2-list"></ul>
            </div>

            <!-- Session 3 -->
            <div class="nav-group">
                <div class="nav-title">Session 3: Geospatial</div>
                <ul class="nav-list" id="session3-list"></ul>
            </div>
        </nav>
    </aside>

    <main class="main-container">
        <div class="top-bar">
            <div class="breadcrumb" id="breadcrumb">Session 1 / introduction.md</div>
        </div>

        <div class="content-body" id="main-content">
            <div id="markdown-content">
                <p style="color: var(--text-secondary)">Loading content...</p>
            </div>
        </div>
    </main>

    <script>
        // Store current code globally to avoid breaking onclick attributes with special characters
        window.currentCode = "";

        // Initialize Mermaid
        mermaid.initialize({ startOnLoad: false, theme: 'default' });

        // No custom renderer needed - we'll post-process links after parsing

        const sessions = {
            s1_intro: { name: 'introduction.md', path: 'session1/sectional_codes/introduction.md', type: 'md' },
            s1: [
                { name: 'summary.md', path: 'session1/sectional_codes/summary.md', type: 'md' },
                { name: '01_hello_world.py', path: 'session1/sectional_codes/01_hello_world.py', type: 'code' },
                { name: '02_variables.py', path: 'session1/sectional_codes/02_variables.py', type: 'code' },
                { name: '03_user_input.py', path: 'session1/sectional_codes/03_user_input.py', type: 'code' },
                { name: '04_math_operations.py', path: 'session1/sectional_codes/04_math_operations.py', type: 'code' },
                { name: '05_if_else.py', path: 'session1/sectional_codes/05_if_else.py', type: 'code' },
                { name: '06_loops.py', path: 'session1/sectional_codes/06_loops.py', type: 'code' },
                { name: '07_section1_summary.py', path: 'session1/sectional_codes/07_section1_summary.py', type: 'code' },
                { name: 'whole_section.py', path: 'session1/sectional_codes/whole_section.py', type: 'code' }
            ],
            s2: [
                { name: 'session2_python_takeoff.ipynb', path: 'session2/session2_python_takeoff.ipynb', type: 'notebook' },
                { name: 'session2_python_takeoff.html', path: 'session2/session2_python_takeoff.html', type: 'web' },
                { name: 'visual_design_scheme.docx', path: 'session2/visual_design_scheme.docx', type: 'doc' }
            ],
            s3: [
                { name: 'session3_python_gis.ipynb', path: 'session3_part/session3_python_gis.ipynb', type: 'notebook' },
                { name: 'aerodromes-ke.geojson', path: 'session3_part/aerodromes-ke.geojson', type: 'geo' }
            ]
        };

        const icons = {
            md: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15l2 2 4-4"/></svg>',
            code: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/></svg>',
            notebook: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
            web: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
            doc: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>',
            geo: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2L2 22h20L12 2z"/></svg>'
        };

        function renderSidebar() {
            Object.keys(sessions).forEach(key => {
                if (key === 's1_intro') return;
                const list = document.getElementById(`${key.replace('s', 'session')}-list`);
                sessions[key].forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'nav-item';
                    li.innerHTML = `${icons[file.type]}${file.name}`;
                    li.onclick = () => loadFile(file, key.replace('s', 'Session '));
                    list.appendChild(li);
                });
            });
        }

        async function copyToClipboard(btn) {
            const textToCopy = window.currentCode;
            if (!textToCopy) return;

            try {
                // Check if Clipboard API is supported and available (requires secure context)
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(textToCopy);
                    showSuccess(btn);
                } else {
                    throw new Error('Clipboard API unavailable');
                }
            } catch (err) {
                // Fallback for non-secure contexts (like file:// protocol)
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                
                // Ensure textarea is not visible but part of DOM
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                textArea.style.top = "0";
                document.body.appendChild(textArea);
                
                textArea.focus();
                textArea.select();
                
                try {
                    const successful = document.execCommand('copy');
                    if (successful) showSuccess(btn);
                    else btn.textContent = 'Error';
                } catch (fallbackErr) {
                    console.error('Fallback copy failed', fallbackErr);
                    btn.textContent = 'Error';
                }
                
                document.body.removeChild(textArea);
            }
        }

        function showSuccess(btn) {
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('copied');
            }, 2000);
        }

        async function loadFile(file, sessionName) {
            // Update UI state
            document.querySelectorAll('.nav-item, .nav-title').forEach(el => el.classList.remove('active'));
            
            // Highlight in sidebar
            const items = document.querySelectorAll('.nav-item');
            let found = false;
            items.forEach(item => {
                if (item.textContent === file.name) {
                    item.classList.add('active');
                    found = true;
                }
            });
            if (!found) {
                const titles = document.querySelectorAll('.nav-title');
                titles.forEach(title => {
                    if (title.textContent.includes(sessionName)) title.classList.add('active');
                });
            }

            document.getElementById('breadcrumb').textContent = `${sessionName} / ${file.name}`;
            const contentDiv = document.getElementById('markdown-content');
            contentDiv.innerHTML = '<p style="color: var(--text-secondary)">Loading...</p>';

            try {
                // Use root-relative path to avoid resolution issues with query strings or base URL changes
                const fetchPath = file.path.startsWith('/') ? file.path : '/' + file.path;
                const response = await fetch(fetchPath, { cache: 'no-store' });
                if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                const text = await response.text();

                if (file.type === 'md') {
                    try {
                        contentDiv.innerHTML = marked.parse(text);
                    } catch (parseErr) {
                        // Fallback: render as plain preformatted text if markdown parsing fails
                        console.warn('marked.parse failed, falling back to plain text:', parseErr);
                        contentDiv.innerHTML = `<pre style="white-space:pre-wrap;font-family:inherit;">${text.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>`;
                    }
                    // Open all links in a new tab
                    contentDiv.querySelectorAll('a[href]').forEach(a => {
                        a.setAttribute('target', '_blank');
                        a.setAttribute('rel', 'noopener noreferrer');
                    });
                    
                    // Post-process for Mermaid
                    const mermaidBlocks = contentDiv.querySelectorAll('pre code.language-mermaid');
                    mermaidBlocks.forEach((block) => {
                        const div = document.createElement('div');
                        div.className = 'mermaid';
                        div.textContent = block.textContent;
                        block.parentElement.replaceWith(div);
                    });
                    if (mermaidBlocks.length > 0) await mermaid.run();
                } else if (file.type === 'code') {
                    // Update global state for copy function
                    window.currentCode = text;
                    
                    // Render code with Prism
                    const highlighted = Prism.highlight(text, Prism.languages.python, 'python');
                    contentDiv.innerHTML = `
                        <h1>${file.name}</h1>
                        <p style="color:var(--text-secondary)">Preview the code below. You can copy it directly or download the file.</p>
                        <div class="code-header">
                            <button class="copy-btn" onclick="copyToClipboard(this)">Copy</button>
                        </div>
                        <pre class="language-python"><code class="language-python">${highlighted}</code></pre>
                        <div class="download-footer">
                            <span style="font-size: 0.85rem; color: var(--text-secondary)">Need the full file?</span>
                            <a href="${file.path}" download class="download-btn-small">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                Download .py File
                            </a>
                        </div>
                    `;
                } else {
                    contentDiv.innerHTML = `
                        <div style="text-align:center; padding: 4rem 2rem; border: 2px dashed var(--border); border-radius: 1rem; background: #f8fafc;">
                            <span style="font-size: 3rem; margin-bottom: 1rem; display: block;">${icons[file.type].replace('viewBox', 'style="width:64px;height:64px" viewBox')}</span>
                            <h3>${file.name}</h3>
                            <p style="color: var(--text-secondary); margin-bottom: 2rem;">This file type cannot be previewed. Please download it to view the content.</p>
                            <a href="${file.path}" download class="download-btn-small" style="padding: 1rem 2rem; font-size: 1rem;">
                                Download File
                            </a>
                        </div>
                    `;
                }
            } catch (err) {
                const isLocal = window.location.protocol === 'file:';
                let errorTitle, errorMessage;
                if (err.message.includes('HTTP')) {
                    errorTitle = '⚠️ File Not Found';
                    errorMessage = `The file <code>${file.path}</code> could not be located on the server (${err.message}).`;
                } else if (isLocal) {
                    errorTitle = '⚠️ Access Restriction';
                    errorMessage = 'CORS policy prevents fetching local files directly in some browsers. Please use a local server (e.g. VS Code Live Server) or download the file.';
                } else {
                    errorTitle = '⚠️ Network Error';
                    errorMessage = `Could not load <code>${file.path}</code>. Check that the file exists and the server is reachable.<br><small style="opacity:0.7">${err.message}</small>`;
                }

                contentDiv.innerHTML = `
                    <div style="text-align:center; padding: 3rem; background: #fff1f2; color: #991b1b; border-radius: 1rem; border: 1px solid #fecaca; max-width: 600px; margin: 3rem auto;">
                        <h3 style="margin-bottom: 1rem;">${errorTitle}</h3>
                        <p style="margin-bottom: 1.5rem; line-height: 1.5; font-size: 0.95rem;">${errorMessage}</p>
                        <div style="display: flex; gap: 1rem; justify-content: center;">
                            <a href="${file.path}" download class="download-btn-small" style="background: #991b1b;">
                                Download File
                            </a>
                            <button onclick="location.reload()" class="download-btn-small" style="background: #64748b; border: none; cursor: pointer;">
                                Retry
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        // Initialize
        renderSidebar();
        loadFile(sessions.s1_intro, 'Session 1');
    </script>
</body>
</html>
