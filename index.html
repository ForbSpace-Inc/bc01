<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootcamp Resources | Documentation</title>
    <meta name="description" content="Documentation and learning materials for the Data Engineering Bootcamp.">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --bg-sidebar: #f1f5f9;
            --bg-content: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent: #2563eb;
            --border: #e2e8f0;
            --sidebar-width: 280px;
            --transition: all 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-content);
            color: var(--text-primary);
            line-height: 1.6;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            color: var(--text-primary);
        }

        .sidebar-header p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .nav-group {
            padding: 1.5rem 0;
        }

        .nav-title {
            padding: 0 1.5rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }

        .nav-list {
            list-style: none;
        }

        .nav-item {
            padding: 0.5rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: var(--transition);
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            color: var(--text-primary);
            background: rgba(0, 0, 0, 0.03);
        }

        .nav-item.active {
            color: var(--accent);
            background: rgba(37, 99, 235, 0.05);
            border-left-color: var(--accent);
        }

        .nav-item svg {
            width: 16px;
            height: 16px;
            opacity: 0.7;
        }

        /* Main Content Styles */
        .main-container {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
        }

        .top-bar {
            height: 60px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .breadcrumb {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .content-body {
            max-width: 800px;
            margin: 0 auto;
            padding: 3rem 2rem 6rem;
            width: 100%;
        }

        /* Markdown Styling */
        #markdown-content {
            color: #334155;
        }

        #markdown-content h1 { font-size: 2.25rem; font-weight: 800; margin-bottom: 1.5rem; color: var(--text-primary); border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        #markdown-content h2 { font-size: 1.5rem; font-weight: 700; margin: 2rem 0 1rem; color: var(--text-primary); }
        #markdown-content h3 { font-size: 1.25rem; font-weight: 600; margin: 1.5rem 0 0.75rem; }
        #markdown-content p { margin-bottom: 1.25rem; }
        #markdown-content ul, #markdown-content ol { margin-bottom: 1.25rem; padding-left: 1.5rem; }
        #markdown-content li { margin-bottom: 0.5rem; }
        #markdown-content code { background: #f1f5f9; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.9em; }
        #markdown-content pre { background: #1e293b; color: #f8fafc; padding: 1.5rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1.5rem; }
        #markdown-content pre code { background: transparent; padding: 0; color: inherit; }
        #markdown-content blockquote { border-left: 4px solid var(--border); padding-left: 1rem; color: var(--text-secondary); font-style: italic; margin-bottom: 1.25rem; }
        #markdown-content img { max-width: 100%; height: auto; border-radius: 0.5rem; margin: 1rem 0; }

        /* Download View */
        .download-view {
            text-align: center;
            padding: 4rem 2rem;
            background: #f8fafc;
            border-radius: 1rem;
            border: 2px dashed var(--border);
        }

        .download-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        .download-btn-large {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--text-primary);
            color: white;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 600;
            margin-top: 1.5rem;
            transition: var(--transition);
        }

        .download-btn-large:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; max-height: 300px; border-r: 0; border-b: 1px solid var(--border); }
            .sidebar-header { padding: 1rem 1.5rem; }
            .top-bar { display: none; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>Bootcamp Hub</h1>
            <p>Data Engineering 2026</p>
        </div>

        <nav id="sidebar-nav">
            <!-- Session 1 -->
            <div class="nav-group">
                <div class="nav-title">Session 1: Basics</div>
                <ul class="nav-list" id="session1-list"></ul>
            </div>

            <!-- Session 2 -->
            <div class="nav-group">
                <div class="nav-title">Session 2: Data Takeoff</div>
                <ul class="nav-list" id="session2-list"></ul>
            </div>

            <!-- Session 3 -->
            <div class="nav-group">
                <div class="nav-title">Session 3: Geospatial</div>
                <ul class="nav-list" id="session3-list"></ul>
            </div>
        </nav>
    </aside>

    <main class="main-container">
        <div class="top-bar">
            <div class="breadcrumb" id="breadcrumb">Session 1 / introduction.md</div>
        </div>

        <div class="content-body" id="main-content">
            <div id="markdown-content">
                <!-- Content will be injected here -->
                <p style="color: var(--text-secondary)">Loading content...</p>
            </div>
        </div>
    </main>

    <script>
        const sessions = {
            s1: [
                { name: 'introduction.md', path: 'session1/sectional codes/introduction.md', type: 'md' },
                { name: 'summary.md', path: 'session1/sectional codes/summary.md', type: 'md' },
                { name: '01_hello_world.py', path: 'session1/sectional codes/01_hello_world.py', type: 'code' },
                { name: '02_variables.py', path: 'session1/sectional codes/02_variables.py', type: 'code' },
                { name: '03_user_input.py', path: 'session1/sectional codes/03_user_input.py', type: 'code' },
                { name: '04_math_operations.py', path: 'session1/sectional codes/04_math_operations.py', type: 'code' },
                { name: '05_if_else.py', path: 'session1/sectional codes/05_if_else.py', type: 'code' },
                { name: '06_loops.py', path: 'session1/sectional codes/06_loops.py', type: 'code' },
                { name: '07_section1_summary.py', path: 'session1/sectional codes/07_section1_summary.py', type: 'code' },
                { name: 'whole_section.py', path: 'session1/sectional codes/whole_section.py', type: 'code' }
            ],
            s2: [
                { name: 'session2_python_takeoff.ipynb', path: 'session2/session2_python_takeoff.ipynb', type: 'notebook' },
                { name: 'session2_python_takeoff.html', path: 'session2/session2_python_takeoff.html', type: 'web' },
                { name: 'visual_design_scheme.docx', path: 'session2/visual_design_scheme.docx', type: 'doc' }
            ],
            s3: [
                { name: 'session3_python_gis.ipynb', path: 'session3_part/session3_python_gis.ipynb', type: 'notebook' },
                { name: 'aerodromes-ke.geojson', path: 'session3_part/aerodromes-ke.geojson', type: 'geo' }
            ]
        };

        const icons = {
            md: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 15l2 2 4-4"/></svg>',
            code: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/></svg>',
            notebook: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
            web: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>',
            doc: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>',
            geo: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2L2 22h20L12 2z"/></svg>'
        };

        function renderSidebar() {
            Object.keys(sessions).forEach(key => {
                const list = document.getElementById(`${key.replace('s', 'session')}-list`);
                sessions[key].forEach(file => {
                    const li = document.createElement('li');
                    li.className = 'nav-item';
                    li.innerHTML = `${icons[file.type]}${file.name}`;
                    li.onclick = () => loadFile(file, key.replace('s', 'Session '));
                    list.appendChild(li);
                });
            });
        }

        async function loadFile(file, sessionName) {
            // Update UI state
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const items = document.querySelectorAll('.nav-item');
            items.forEach(item => {
                if (item.textContent === file.name) item.classList.add('active');
            });

            document.getElementById('breadcrumb').textContent = `${sessionName} / ${file.name}`;
            const contentDiv = document.getElementById('markdown-content');
            contentDiv.innerHTML = '<p style="color: var(--text-secondary)">Loading...</p>';

            if (file.type === 'md') {
                try {
                    const response = await fetch(file.path);
                    if (!response.ok) throw new Error('File not found');
                    const text = await response.text();
                    contentDiv.innerHTML = marked.parse(text);
                } catch (err) {
                    contentDiv.innerHTML = `<div class="download-view">
                        <span class="download-icon">⚠️</span>
                        <h3>Access Restriction</h3>
                        <p>To view markdown files directly, this page must be served via HTTP (locally or hosted). Browsers often block local file fetching.</p>
                        <a href="${file.path}" download class="download-btn-large">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Download Instead
                        </a>
                    </div>`;
                }
            } else {
                contentDiv.innerHTML = `
                    <div class="download-view">
                        <span class="download-icon">${icons[file.type].replace('viewBox', 'style="width:64px;height:64px" viewBox')}</span>
                        <h3>${file.name}</h3>
                        <p>This file type cannot be previewed directly in the documentation view.</p>
                        <a href="${file.path}" download class="download-btn-large">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                            Download File
                        </a>
                    </div>
                `;
            }
        }

        // Initialize
        renderSidebar();
        // Load default file
        loadFile(sessions.s1[0], 'Session 1');
    </script>
</body>
</html>
